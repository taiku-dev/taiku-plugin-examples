<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAIKU_PLUGIN_NAME</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 10px;
        min-height: 100vh;
        background: #18181b;
        color: #d4d4d8;
        font: 12px/1.5 system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .card {
        background: #09090b;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 14px;
        color: #f4f4f5;
      }

      .muted {
        color: #71717a;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .stat {
        padding: 8px;
        border-radius: 6px;
        background: #18181b;
        border: 1px solid #27272a;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #71717a;
      }

      .stat-value {
        margin-top: 4px;
        font-size: 16px;
        font-weight: 600;
        color: #f4f4f5;
      }

      .shell-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .shell {
        padding: 8px;
        border-radius: 6px;
        background: #18181b;
        border: 1px solid #27272a;
      }

      .shell-title {
        color: #93c5fd;
        font-weight: 600;
      }

      .shell-preview {
        margin-top: 4px;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        white-space: pre-wrap;
        word-break: break-word;
        color: #a1a1aa;
      }

      button {
        border: 1px solid #3f3f46;
        background: #27272a;
        color: #f4f4f5;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 11px;
        cursor: pointer;
      }

      button:hover {
        background: #3f3f46;
      }

      .empty {
        color: #71717a;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>TAIKU_PLUGIN_NAME</h1>
        <div class="muted">Live session snapshot</div>
      </div>
      <button id="refresh" type="button">Refresh</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Session</div>
        <div class="stat-value" id="session-name">…</div>
      </div>
      <div class="stat">
        <div class="stat-label">Shells</div>
        <div class="stat-value" id="shell-count">0</div>
      </div>
    </div>

    <div class="card">
      <div class="muted">Latest shells</div>
      <div class="shell-list" id="shell-list">
        <div class="empty">Waiting for taiku…</div>
      </div>
    </div>

    <script type="module" src="./panel.js"></script>
  </body>
</html>
